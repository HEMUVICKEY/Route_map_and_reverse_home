<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultimate Walk Tracker Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #4361ee;
            --danger: #ef476f;
            --dark: #1d2b36;
            --light: #f8f9fa;
            --success: #06d6a0;
            --warning: #f4a261;
            --purple: #9b5de5;
            --card-bg: #ffffff;
            --text-main: #1d2b36;
            --text-muted: #888888;
        }

        body.dark-mode {
            --dark: #0f1c24;
            --light: #1d2b36;
            --card-bg: #243440;
            --text-main: #f8f9fa;
            --text-muted: #a0aab5;
            background: #0f1c24;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            margin: 0; 
            font-family: 'Inter', sans-serif; 
            background: var(--light); 
            height: 100dvh; 
            display: flex; 
            flex-direction: column;
            overflow: hidden;
            color: var(--text-main);
            transition: background 0.3s, color 0.3s;
        }

        /* --- Header --- */
        #header {
            background: var(--dark);
            color: white;
            padding: 8px 16px;
            font-size: 0.85em;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            z-index: 1100;
            gap: 10px;
        }
        #header .header-item { background: rgba(255,255,255,0.1); padding: 6px 10px; border-radius: 8px; display: flex; align-items: center; gap: 6px; }
        #timeInfo span { color: var(--success); }
        #sosBtn { background: var(--danger); color: white; border: none; padding: 6px 12px; border-radius: 8px; font-weight: 800; animation: pulse-sos 2s infinite; cursor: pointer;}
        
        /* --- Search Bar --- */
        #searchContainer {
            position: absolute;
            top: 70px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 500px;
            z-index: 1000;
            display: flex; gap: 10px;
        }
        #searchInput {
            flex: 1; padding: 12px 16px; border: none; border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15); font-family: 'Inter'; font-weight: 600; font-size: 0.9em;
            background: var(--card-bg); color: var(--text-main);
        }
        #searchResults {
            position: absolute; top: 50px; left: 0; right: 0; 
            background: var(--card-bg); border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            max-height: 250px; overflow-y: auto; display: none;
        }
        .search-item { padding: 12px 16px; border-bottom: 1px solid #eee; cursor: pointer; font-size: 0.9em; }
        .search-item:hover { background: rgba(0,0,0,0.05); }

        /* --- Dashboard --- */
        #dashboard {
            display: flex;
            background: var(--card-bg);
            padding: 12px 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            z-index: 1000;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            flex-shrink: 0;
            transition: background 0.3s;
        }
        .stat-box { text-align: center; flex: 1; position: relative; }
        .stat-box:not(:last-child)::after { content: ''; position: absolute; right: 0; top: 20%; height: 60%; width: 1px; background: rgba(0,0,0,0.1); }
        .stat-box h3 { margin: 0; font-size: 1.6em; font-weight: 800; color: var(--text-main); }
        .stat-box p { margin: 2px 0 0; font-size: 0.65em; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600;}

        /* --- Map Area --- */
        #map { 
            flex-grow: 1; 
            width: 100%; 
            z-index: 1;
            position: relative;
            background: #ddd;
        }

        /* Leaflet Dark Mode Adjustments */
        body.dark-mode .leaflet-tile { filter: brightness(0.8) contrast(1.2); }
        body.dark-mode .leaflet-popup-content-wrapper, body.dark-mode .leaflet-popup-tip { background: var(--card-bg); color: var(--text-main); }
        body.dark-mode .leaflet-bar a { background: var(--card-bg); color: var(--text-main); border-color: var(--dark); }
        .leaflet-control-attribution { display: none !important; } /* Hide Attribution */

        /* Floating Map Controls */
        .map-controls-wrapper {
            position: absolute;
            bottom: 100px; right: 15px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .map-card {
            background: var(--card-bg); padding: 8px 12px; border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15); color: var(--text-main);
        }
        .map-card select { border: none; background: transparent; font-family: 'Inter', sans-serif; font-weight: 600; font-size: 0.85em; cursor: pointer; outline: none; color: inherit; }
        
        .map-btn, .fab-btn {
            width: 44px; height: 44px;
            background: var(--card-bg); border: none; border-radius: 50%;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            font-size: 1.1em; cursor: pointer; color: var(--dark);
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.2s, background 0.2s, color 0.2s;
        }
        .map-btn:active, .fab-btn:active { transform: scale(0.95); }
        .map-btn.active, .fab-btn.active { background: var(--warning); color: white; }

        /* --- FAB Menu --- */
        .fab-main {
            position: absolute;
            bottom: 100px; left: 15px;
            width: 56px; height: 56px; background: var(--primary); color: white;
            border-radius: 50%; border: none; box-shadow: 0 6px 20px rgba(67, 97, 238, 0.4);
            font-size: 1.5em; cursor: pointer; z-index: 1000;
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.3s;
        }
        .fab-main.open { transform: rotate(45deg); }
        .fab-options {
            position: absolute; bottom: 165px; left: 15px;
            display: flex; flex-direction: column; gap: 12px; z-index: 999;
            opacity: 0; pointer-events: none; transition: opacity 0.3s, transform 0.3s;
            transform: translateY(20px);
        }
        .fab-options.show { opacity: 1; pointer-events: auto; transform: translateY(0); }

        /* --- Bottom Controls --- */
        .controls {
            background: var(--card-bg);
            padding: 12px 16px;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.05);
            display: flex;
            gap: 10px;
            z-index: 1000;
            border-top: 1px solid rgba(0,0,0,0.05);
            flex-shrink: 0;
        }
        button {
            padding: 14px 16px; font-size: 1em; cursor: pointer; border: none; border-radius: 14px;
            font-weight: 700; color: white; transition: transform 0.1s, background 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); font-family: 'Inter', sans-serif;
        }
        button:active { transform: scale(0.96); }
        
        #startBtn { background: var(--primary); flex: 2; }
        #startBtn.recording { background: var(--danger); animation: pulse 2s infinite; }
        #homeBtn { background: var(--dark); flex: 1.5; }
        #shareBtn { background: var(--light); color: var(--dark); flex: 0.5; font-size: 1.2em; padding: 0; }
        body.dark-mode #shareBtn { background: #2a3b47; color: #fff; }

        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 71, 111, 0.4); } 70% { box-shadow: 0 0 0 12px rgba(239, 71, 111, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 71, 111, 0); } }
        @keyframes pulse-sos { 0% { box-shadow: 0 0 0 0 rgba(239, 71, 111, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(239, 71, 111, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 71, 111, 0); } }

        /* Pulse Marker */
        .pulse-marker { border-radius: 50%; animation: pulse-gps 2s infinite; }
        @keyframes pulse-gps { 0% { box-shadow: 0 0 0 0 rgba(67, 97, 238, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(67, 97, 238, 0); } 100% { box-shadow: 0 0 0 0 rgba(67, 97, 238, 0); } }

        /* Directions Panel */
        #directionsPanel {
            position: absolute; top: 70px; right: 10px; width: 300px; max-height: 50%;
            background: var(--card-bg); border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            z-index: 1001; display: none; flex-direction: column; overflow: hidden;
        }
        #directionsPanel.show { display: flex; }
        .dir-header { padding: 12px; background: var(--primary); color: white; font-weight: 700; display: flex; justify-content: space-between; }
        .dir-list { overflow-y: auto; padding: 10px; }
        .dir-step { padding: 8px 0; border-bottom: 1px solid #eee; font-size: 0.9em; display: flex; gap: 10px; align-items: center; }
        .dir-step i { color: var(--primary); }

        /* Compass */
        #compass {
            position: absolute; top: 80px; left: 15px; width: 40px; height: 40px;
            background: var(--card-bg); border-radius: 50%; box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            display: flex; align-items: center; justify-content: center; z-index: 1000;
            font-weight: 800; color: var(--danger); font-size: 1.2em;
        }
        #compass i { transition: transform 0.2s; }

        /* Loading Spinner */
        #loader {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 2000; display: none;
        }
        .spinner { border: 4px solid rgba(255,255,255,0.3); border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Translations & Settings */
        .lang-select { background: rgba(255,255,255,0.1); color: white; border: none; padding: 4px; border-radius: 8px; font-family: 'Inter'; cursor: pointer;}
        select option { color: black; }
    </style>
</head>
<body>

<!-- Header -->
<div id="header">
    <div id="timeInfo" class="header-item">
        <i class="fas fa-clock"></i> <span id="startTimeTxt">--:--</span> | <i class="fas fa-home"></i> <span id="etaHomeTxt">--:--</span>
    </div>
    <div style="display:flex; gap: 8px; align-items: center;">
        <select id="langSelect" class="lang-select" onchange="changeLanguage()">
            <option value="en">EN</option>
            <option value="es">ES</option>
            <option value="fr">FR</option>
        </select>
        <div id="weatherWidget" class="header-item">🌤️ 72°F</div>
        <button id="sosBtn" onclick="triggerSOS()">SOS</button>
    </div>
</div>

<!-- Search Bar -->
<div id="searchContainer">
    <div style="position: relative; flex: 1;">
        <input type="text" id="searchInput" placeholder="Search location..." oninput="searchLocation()">
        <div id="searchResults"></div>
    </div>
</div>

<!-- Compass -->
<div id="compass" title="Compass"><i class="fas fa-location-arrow" id="compassNeedle"></i></div>

<!-- Directions Panel -->
<div id="directionsPanel">
    <div class="dir-header">
        <span>Turn-by-Turn Directions</span>
        <button onclick="document.getElementById('directionsPanel').classList.remove('show')" style="background:transparent; box-shadow:none; padding:0;"><i class="fas fa-times"></i></button>
    </div>
    <div class="dir-list" id="dirListSteps">No route generated.</div>
</div>

<!-- Top Live Stats -->
<div id="dashboard">
    <div class="stat-box">
        <h3 id="stepsCount">0</h3>
        <p data-translate="steps">Steps</p>
    </div>
    <div class="stat-box">
        <h3 id="distanceCount">0.00</h3>
        <p>KM</p>
    </div>
    <div class="stat-box">
        <h3 id="speedCount">0.0</h3>
        <p>km/h</p>
    </div>
</div>

<!-- Map Container -->
<div id="map">
    <div id="loader"><div class="spinner"></div></div>
    
    <div class="map-controls-wrapper">
        <div class="map-card">
            <select id="mapStyle" onchange="changeMapStyle()">
                <option value="streets">Standard</option>
                <option value="satellite">Satellite</option>
                <option value="dark">Dark Mode</option>
                <option value="topo">Topographic</option>
            </select>
        </div>
        <button class="map-btn" id="measureBtn" onclick="toggleMeasure()" title="Measure Distance"><i class="fas fa-ruler"></i></button>
        <button class="map-btn" id="nearbyBtn" onclick="showNearbyPlaces()" title="Nearby Places"><i class="fas fa-store"></i></button>
        <button class="map-btn" onclick="locateMe()" title="Find Me"><i class="fas fa-crosshairs"></i></button>
        <button class="map-btn" onclick="resetTrip()" title="Reset Trip"><i class="fas fa-trash"></i></button>
    </div>

    <!-- FAB Menu -->
    <button class="fab-main" onclick="toggleFab()"><i class="fas fa-plus" id="fabIcon"></i></button>
    <div class="fab-options" id="fabOptions">
        <button class="fab-btn" id="addLocBtn" onclick="toggleMode('loc')" title="Add Waypoint"><i class="fas fa-map-pin"></i></button>
        <button class="fab-btn" id="addFriendHouseBtn" onclick="toggleMode('friendHouse')" title="Add Friend's House"><i class="fas fa-house-user"></i></button>
        <button class="fab-btn" id="addFriendBtn" onclick="toggleMode('friend')" title="Add Walking Friend"><i class="fas fa-person-walking"></i></button>
        <button class="fab-btn" onclick="exportData()" title="Export Data"><i class="fas fa-download"></i></button>
        <button class="fab-btn" onclick="document.getElementById('importFile').click()" title="Import Data"><i class="fas fa-upload"></i></button>
        <input type="file" id="importFile" style="display:none" accept=".json" onchange="importData(event)">
    </div>
</div>

<!-- Bottom Controls -->
<div class="controls">
    <button id="startBtn">Start Walk</button>
    <button id="homeBtn">Route Home</button>
    <button id="shareBtn" onclick="shareLocation()" title="Share Location"><i class="fas fa-share-alt"></i></button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // --- 0. STATE & LOCAL STORAGE ---
    const STORAGE_KEY = 'walkTrackerProData';
    let appState = {
        home: null,
        favorites: [],
        customLocations: [],
        friendHouses: [],
        walkingFriends: [],
        steps: 0,
        distance: 0,
        settings: { mapStyle: 'streets', lang: 'en', darkMode: false }
    };

    function loadState() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
            appState = JSON.parse(saved);
            document.getElementById('mapStyle').value = appState.settings.mapStyle;
            document.getElementById('langSelect').value = appState.settings.lang;
            if (appState.settings.darkMode) document.body.classList.add('dark-mode');
            
            // Restore markers
            if (appState.home) homeMarker = createMarker(appState.home, '🏠', "<b>Home Base</b>");
            appState.customLocations.forEach(loc => createMarker(loc.pos, '📌', `<b>${loc.name}</b><br><button onclick="removeCustomLoc('${loc.id}')" style="color:red; cursor:pointer; border:none; background:transparent;">Delete</button>`, loc.id));
            appState.favorites.forEach(loc => createMarker(loc.pos, '⭐', `<b>${loc.name}</b> (Favorite)`, loc.id));
        }
    }

    function saveState() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(appState));
    }

    // --- 1. INITIALIZE MAP ---
    const map = L.map('map', { zoomControl: false, doubleClickZoom: false, attributionControl: false }).setView([40.7128, -74.0060], 16);
    let currentLayer;
    let measureLayer = L.layerGroup().addTo(map);
    let measurePoints = [];
    let isMeasuring = false;

    window.changeMapStyle = function() {
        const style = document.getElementById('mapStyle').value;
        if (currentLayer) map.removeLayer(currentLayer);
        appState.settings.mapStyle = style;

        if (style === 'satellite') currentLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}');
        else if (style === 'dark') { currentLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'); document.body.classList.add('dark-mode'); appState.settings.darkMode = true; }
        else if (style === 'topo') { currentLayer = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png'); document.body.classList.remove('dark-mode'); appState.settings.darkMode = false; }
        else { currentLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'); document.body.classList.remove('dark-mode'); appState.settings.darkMode = false; }
        
        currentLayer.addTo(map);
        saveState();
    }

    // --- 2. MAP VARIABLES ---
    let walkPath = [];
    let walkPolyline = L.polyline([], {color: '#4361ee', weight: 6, lineCap: 'round'}).addTo(map);
    let homePolyline = L.polyline([], {color: '#ef476f', weight: 5, dashArray: '5, 10'}).addTo(map);
    let friendHouseLine = L.polyline([], {color: '#9b5de5', weight: 3, dashArray: '2, 8'}).addTo(map);
    
    let watchId = null;
    let homeMarker = null;
    let userMarker = null;
    let lastPos = null;
    let lastTimestamp = 0;
    let currentSpeed = 0;
    let startTime = null;
    let activeMode = null;
    let totalDistance = 0; 
    let stepCount = 0;

    // --- 3. MAP CLICK HANDLER ---
    map.on('click', (e) => {
        if (isMeasuring) {
            measurePoints.push(e.latlng);
            L.circleMarker(e.latlng, {radius: 4, color: '#ef476f'}).addTo(measureLayer);
            if (measurePoints.length > 1) {
                L.polyline(measurePoints, {color: '#ef476f', dashArray: '5, 5'}).addTo(measureLayer);
                let dist = 0;
                for (let i = 1; i < measurePoints.length; i++) {
                    dist += map.distance(measurePoints[i-1], measurePoints[i]);
                }
                map.openPopup(`<b>Distance:</b> ${(dist/1000).toFixed(2)} km`, e.latlng);
            }
            return;
        }

        if (!activeMode) return;

        if (activeMode === 'loc') {
            const name = prompt("Enter name for this location:", "My Spot");
            if (name) {
                const id = 'loc_' + Date.now();
                const marker = createMarker(e.latlng, '📌', `<b>${name}</b><br><button onclick="removeCustomLoc('${id}')" style="color:red; cursor:pointer; border:none; background:transparent;">Delete</button>`, id);
                appState.customLocations.push({id, name, pos: [e.latlng.lat, e.latlng.lng]});
                saveState();
            }
        } else if (activeMode === 'friendHouse') {
            const marker = createMarker(e.latlng, '🏡', `<b>Friend's House</b><br><button onclick="removeFriendHouse()" style="color:red; cursor:pointer; border:none; background:transparent;">Remove</button>`);
            appState.friendHouses.push({pos: [e.latlng.lat, e.latlng.lng]});
            if (lastPos) friendHouseLine.setLatLngs([lastPos, e.latlng]);
            saveState();
        } else if (activeMode === 'friend') {
            createMarker(e.latlng, '🏃', "<b>Walking Friend</b>");
            appState.walkingFriends.push({pos: [e.latlng.lat, e.latlng.lng]});
            saveState();
        }
        toggleMode(activeMode);
    });

    function createMarker(latlng, iconHtml, popupHtml, id = null) {
        const icon = L.divIcon({ className: '', html: `<div style="font-size: 28px; transform: translate(-12px, -28px);">${iconHtml}</div>`, iconSize: [28, 28] });
        const marker = L.marker(latlng, {icon}).addTo(map).bindPopup(popupHtml);
        marker._custom_id = id;
        return marker;
    }

    window.removeCustomLoc = function(id) {
        appState.customLocations = appState.customLocations.filter(l => l.id !== id);
        map.eachLayer(layer => {
            if (layer instanceof L.Marker && layer._custom_id === id) map.removeLayer(layer);
        });
        saveState();
    }

    window.toggleMode = function(mode) {
        activeMode = activeMode === mode ? null : mode;
        document.querySelectorAll('.fab-btn').forEach(btn => btn.classList.remove('active'));
        if (activeMode) document.getElementById(mode === 'loc' ? 'addLocBtn' : mode === 'friendHouse' ? 'addFriendHouseBtn' : 'addFriendBtn').classList.add('active');
    }

    window.toggleMeasure = function() {
        isMeasuring = !isMeasuring;
        document.getElementById('measureBtn').classList.toggle('active', isMeasuring);
        if (!isMeasuring) { measureLayer.clearLayers(); measurePoints = []; }
    }

    // --- 4. START BUTTON LOGIC ---
    const startBtn = document.getElementById('startBtn');
    startBtn.addEventListener('click', async () => {
        if (watchId) {
            navigator.geolocation.clearWatch(watchId);
            watchId = null;
            startBtn.innerText = "Resume Walk";
            startBtn.classList.remove('recording');
            return;
        }

        // Request Motion & Orientation Permissions
        if (typeof DeviceMotionEvent.requestPermission === 'function') {
            try {
                const motionPerm = await DeviceMotionEvent.requestPermission();
                if (motionPerm === 'granted') window.addEventListener('devicemotion', handleMotion);
                
                if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                    const orientPerm = await DeviceOrientationEvent.requestPermission();
                    if (orientPerm === 'granted') window.addEventListener('deviceorientationabsolute', handleOrientation);
                }
            } catch (e) { console.error(e); }
        } else {
            window.addEventListener('devicemotion', handleMotion);
            window.addEventListener('deviceorientationabsolute', handleOrientation);
        }

        startBtn.innerText = "Pause Walk";
        startBtn.classList.add('recording');

        if (!appState.home) {
            navigator.geolocation.getCurrentPosition(pos => {
                const homeCoords = [pos.coords.latitude, pos.coords.longitude];
                homeMarker = createMarker(homeCoords, '🏠', "<b>Home Base</b>");
                appState.home = homeCoords;
                saveState();
            }, err => alert("Cannot get initial location: " + err.message), { enableHighAccuracy: true });
        } else {
            if (!homeMarker) homeMarker = createMarker(appState.home, '🏠', "<b>Home Base</b>");
        }

        startTime = new Date();
        document.getElementById('startTimeTxt').innerText = startTime.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

        watchId = navigator.geolocation.watchPosition(pos => {
            const currentCoords = [pos.coords.latitude, pos.coords.longitude];
            const currentTime = pos.timestamp;

            // Initialize lastPos on first fix
            if (!lastPos) {
                lastPos = currentCoords;
                lastTimestamp = currentTime;
                if (userMarker) map.removeLayer(userMarker);
                userMarker = L.marker(currentCoords, {icon: L.divIcon({ className: 'pulse-marker', html: '<div style="width:16px;height:16px;background:#4361ee;border:3px solid white;border-radius:50%;"></div>', iconSize: [16, 16] })}).addTo(map);
                map.panTo(currentCoords);
                return;
            }

            let distMoved = map.distance(lastPos, currentCoords);
            if (distMoved > 3) {
                totalDistance += distMoved;
                let timeDiffHours = (currentTime - lastTimestamp) / 3600000; 
                currentSpeed = (distMoved / 1000) / timeDiffHours;
                
                document.getElementById('distanceCount').innerText = (totalDistance / 1000).toFixed(2);
                document.getElementById('speedCount').innerText = isNaN(currentSpeed) ? 0 : currentSpeed.toFixed(1);
                
                walkPath.push(currentCoords);
                walkPolyline.setLatLngs(walkPath);
                
                if (userMarker) map.removeLayer(userMarker);
                userMarker = L.marker(currentCoords, {icon: L.divIcon({ className: 'pulse-marker', html: '<div style="width:16px;height:16px;background:#4361ee;border:3px solid white;border-radius:50%;"></div>', iconSize: [16, 16] })}).addTo(map);
                
                map.panTo(currentCoords); 
                lastPos = currentCoords;
                lastTimestamp = currentTime;
                appState.distance = totalDistance;
                appState.steps = stepCount;
                saveState();
                updateLiveETA();
            }
        }, err => alert("GPS Error: " + err.message), { enableHighAccuracy: true });
    });

    // --- 5. ROUTE HOME LOGIC (OSRM) ---
    document.getElementById('homeBtn').addEventListener('click', () => {
        if (!lastPos || !appState.home) { alert("Home or current location not set!"); return; }
        document.getElementById('loader').style.display = 'block';
        
        // Fetch route from OSRM
        fetch(`https://router.project-osrm.org/route/v1/foot/${lastPos[1]},${lastPos[0]};${appState.home[1]},${appState.home[0]}?overview=full&geometries=geojson&steps=true`)
            .then(res => res.json())
            .then(data => {
                document.getElementById('loader').style.display = 'none';
                if (data.routes && data.routes.length > 0) {
                    const route = data.routes[0];
                    const routeCoords = route.geometry.coordinates.map(c => [c[1], c[0]]);
                    homePolyline.setLatLngs(routeCoords);
                    map.fitBounds(homePolyline.getBounds(), { padding: [50, 50] });
                    
                    // Turn-by-turn directions
                    const dirList = document.getElementById('dirListSteps');
                    dirList.innerHTML = '';
                    route.legs[0].steps.forEach(step => {
                        const instr = step.maneuver.type === "depart" ? "Start" : 
                                      step.maneuver.modifier ? step.maneuver.modifier.charAt(0).toUpperCase() + step.maneuver.modifier.slice(1) : "Continue";
                        const name = step.name ? `on ${step.name}` : "";
                        const dist = step.distance > 0 ? `(${step.distance}m)` : "";
                        
                        const div = document.createElement('div');
                        div.className = 'dir-step';
                        div.innerHTML = `<i class="fas fa-directions"></i> ${instr} ${name} ${dist}`;
                        dirList.appendChild(div);
                    });
                    document.getElementById('directionsPanel').classList.add('show');
                    
                    let timeMinutes = Math.round(route.duration / 60);
                    let arrivalDate = new Date(Date.now() + timeMinutes * 60000);
                    document.getElementById('etaHomeTxt').innerText = arrivalDate.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) + ` (${timeMinutes}m)`;
                } else {
                    alert("Could not calculate route.");
                }
            }).catch(() => {
                document.getElementById('loader').style.display = 'none';
                alert("Routing error. Using direct line.");
                homePolyline.setLatLngs([lastPos, appState.home]);
            });
    });

    // --- 6. GLOBAL HELPER FUNCTIONS ---
    window.removeHome = function() { alert("Home location cannot be deleted to ensure safe return!"); };

    window.removeFriendHouse = function() {
        appState.friendHouses = [];
        map.eachLayer(layer => {
            if (layer instanceof L.Marker && layer.options.icon && layer.options.icon.options.html.includes('🏡')) map.removeLayer(layer);
        });
        friendHouseLine.setLatLngs([]);
        saveState();
    };

    window.locateMe = function() { if (lastPos) map.panTo(lastPos); else alert("Start walking to track your location."); };

    window.shareLocation = function() {
        if (!lastPos) return alert("Start walking to share your location.");
        const dummyUrl = `https://maps.example.com/walk?lat=${lastPos[0].toFixed(5)}&lng=${lastPos[1].toFixed(5)}`;
        if (navigator.share) {
            navigator.share({ title: 'My Walk Location', text: 'Track my walk here:', url: dummyUrl }).catch(err => console.log(err));
        } else {
            navigator.clipboard.writeText(dummyUrl).then(() => alert("Live location link copied!")).catch(() => alert("URL: " + dummyUrl));
        }
    };

    window.resetTrip = function() {
        if (!confirm("Reset route history for a new walk? Home location will be saved.")) return;
        if (watchId) navigator.geolocation.clearWatch(watchId);
        watchId = null;
        startBtn.innerText = "Start Walk";
        startBtn.classList.remove('recording');
        walkPath = []; walkPolyline.setLatLngs([]); homePolyline.setLatLngs([]);
        if (userMarker) { map.removeLayer(userMarker); userMarker = null; }
        totalDistance = 0; stepCount = 0; currentSpeed = 0; lastPos = null; startTime = null;
        appState.distance = 0; appState.steps = 0;
        document.getElementById('stepsCount').innerText = "0";
        document.getElementById('distanceCount').innerText = "0.00";
        document.getElementById('speedCount').innerText = "0.0";
        document.getElementById('startTimeTxt').innerText = "--:--";
        document.getElementById('etaHomeTxt').innerText = "--:--";
        saveState();
    };

    // --- 7. STEP COUNTER ---
    let isStepInProgress = false;
    const STEP_THRESHOLD = 1.2; 
    let lastStepTime = 0;

    function handleMotion(event) {
        if (!watchId) return;
        const acc = event.accelerationIncludingGravity;
        if (!acc || acc.x === null) return;
        const magnitude = Math.sqrt(acc.x*acc.x + acc.y*acc.y + acc.z*acc.z);
        const delta = Math.abs(magnitude - 9.8); 
        const now = Date.now();
        if (delta > STEP_THRESHOLD && !isStepInProgress && (now - lastStepTime > 300)) {
            stepCount++;
            document.getElementById('stepsCount').innerText = stepCount;
            isStepInProgress = true;
            lastStepTime = now;
        } else if (delta < STEP_THRESHOLD) {
            isStepInProgress = false;
        }
    }

    // --- 8. NEW FEATURES ---
    let searchTimeout;
    window.searchLocation = function() {
        clearTimeout(searchTimeout);
        const q = document.getElementById('searchInput').value;
        const resBox = document.getElementById('searchResults');
        if (q.length < 3) { resBox.style.display = 'none'; return; }
        
        searchTimeout = setTimeout(() => {
            fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${q}`)
                .then(res => res.json())
                .then(data => {
                    resBox.innerHTML = '';
                    data.slice(0, 5).forEach(item => {
                        const div = document.createElement('div');
                        div.className = 'search-item';
                        div.innerText = item.display_name;
                        div.onclick = () => {
                            map.setView([item.lat, item.lon], 16);
                            resBox.style.display = 'none';
                            document.getElementById('searchInput').value = item.display_name.split(',')[0];
                        };
                        resBox.appendChild(div);
                    });
                    resBox.style.display = 'block';
                });
        }, 500);
    }

    window.showNearbyPlaces = function() {
        if (!lastPos) return alert("Start walking to find nearby places.");
        document.getElementById('loader').style.display = 'block';
        const query = `[out:json];node(around:2000,${lastPos[0]},${lastPos[1]})["amenity"~"hospital|police|bus_station|fuel|atm|restaurant|hotel"];out 10;`;
        fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`)
            .then(res => res.json())
            .then(data => {
                document.getElementById('loader').style.display = 'none';
                data.elements.forEach(el => {
                    const tags = el.tags || {};
                    const name = tags.name || tags.amenity.charAt(0).toUpperCase() + tags.amenity.slice(1);
                    const icon = tags.amenity === 'hospital' ? '🏥' : tags.amenity === 'police' ? '🚓' : tags.amenity === 'restaurant' ? '🍴' : tags.amenity === 'hotel' ? '🏨' : tags.amenity === 'atm' ? '💳' : tags.amenity === 'fuel' ? '⛽' : '🚉';
                    createMarker([el.lat, el.lon], icon, `<b>${name}</b><br>Distance: ${Math.round(map.distance(lastPos, [el.lat, el.lon]))}m`);
                });
            }).catch(() => {
                document.getElementById('loader').style.display = 'none';
                alert("Could not fetch nearby places.");
            });
    }

    window.triggerSOS = function() {
        if (!lastPos) return alert("Location not acquired for SOS. Start walking first.");
        const msg = `EMERGENCY! I need help. My location is: https://maps.google.com/?q=${lastPos[0]},${lastPos[1]}`;
        if (navigator.share) {
            navigator.share({ title: 'SOS Emergency', text: msg }).catch(err => console.log(err));
        } else {
            window.location.href = `sms:911?body=${encodeURIComponent(msg)}`;
        }
    }

    window.toggleFab = function() {
        document.getElementById('fabOptions').classList.toggle('show');
        document.getElementById('fabIcon').classList.toggle('fa-plus');
        document.getElementById('fabIcon').classList.toggle('fa-times');
    }

    window.exportData = function() {
        const dataStr = JSON.stringify(appState);
        const blob = new Blob([dataStr], {type: "application/json"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = "walk_tracker_data.json"; a.click();
    }

    window.importData = function(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = e => {
            try {
                appState = JSON.parse(e.target.result);
                saveState();
                location.reload();
            } catch (err) { alert("Invalid file."); }
        };
        reader.readAsText(file);
    }

    // Compass Visual Rotation
    function handleOrientation(e) {
        if (e.absolute || e.webkitCompassHeading) {
            let heading = e.webkitCompassHeading || Math.abs(e.alpha - 360);
            document.getElementById('compassNeedle').style.transform = `rotate(${-heading}deg)`;
        }
    }

    // Midnight Reset
    function setupMidnightReset() {
        const now = new Date();
        const night = new Date(now);
        night.setHours(23, 59, 59, 0);
        const msToMidnight = night.getTime() - now.getTime();
        setTimeout(() => {
            resetTrip();
            setupMidnightReset();
        }, msToMidnight);
    }

    // Multi-language (Simple Dictionary)
    const translations = {
        en: { steps: "Steps", start: "Start Walk", pause: "Pause Walk" },
        es: { steps: "Pasos", start: "Iniciar", pause: "Pausar" },
        fr: { steps: "Pas", start: "Commencer", pause: "Pause" }
    };
    window.changeLanguage = function() {
        const lang = document.getElementById('langSelect').value;
        appState.settings.lang = lang;
        document.querySelectorAll('[data-translate]').forEach(el => {
            const key = el.getAttribute('data-translate');
            if (translations[lang] && translations[lang][key]) el.innerText = translations[lang][key];
        });
        saveState();
    }

    function updateLiveETA() {
        if (currentSpeed > 1 && startTime) {
            let timeHours = (totalDistance / 1000) / currentSpeed;
            let timeMinutes = Math.round(timeHours * 60);
            let arrivalDate = new Date(Date.now() + timeMinutes * 60000);
            document.getElementById('etaHomeTxt').innerText = `${arrivalDate.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})} (${timeMinutes}m)`;
        }
    }

    // Init App
    loadState();
    changeMapStyle();
    changeLanguage();
    setupMidnightReset();
</script>
</body>
</html>
